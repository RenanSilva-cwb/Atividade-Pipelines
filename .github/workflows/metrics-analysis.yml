name: IA analisando métricas

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:

  analisar-metricas:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Login GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: IA analisa métricas
        env:
          GROQCLOUD_API_KEY: ${{ secrets.GROQCLOUD_API_KEY }}

        run: |

          echo "Lendo métricas..."

          METRICS=$(cat metrics/system.json | jq -c . | sed 's/"/\\"/g')

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQCLOUD_API_KEY" \
            -d "{
              \"model\": \"llama-3.1-8b-instant\",
              \"messages\": [
                {
                  \"role\": \"system\",
                \"content\": \"Você é um classificador de métricas. Responda 'APROVADO' ou 'REPROVADO' Em caso de reprovado, faça uma análise.\nThresholds críticos:\n- Active Users >= 250 → REPROVADO\n- CPU >= 80% → REPROVADO\n- Memory >= 85% → REPROVADO\n- DB Connections >= 95% do limite → REPROVADO\n- Avg Response >= 2000ms → REPROVADO\nExemplos:\n{\\\"active_users\\\":120,\\\"cpu\\\":45,\\\"memory\\\":60,\\\"db_connections\\\":50,\\\"db_connections_limit\\\":200,\\\"avg_response_ms\\\":500} → APROVADO\n{\\\"active_users\\\":185,\\\"cpu\\\":94,\\\"memory\\\":91,\\\"db_connections\\\":198,\\\"db_connections_limit\\\":200,\\\"avg_response_ms\\\":4200} → REPROVADO\"},
                {
                  \"role\": \"user\",
                  \"content\": \"$METRICS\"
                }
              ]
            }")

          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['choices'][0]['message']['content'])")

          echo "$DECISION"

          if echo "$DECISION" | grep -qiE "REPROVADO"; then

            ISSUE_URL=$(gh issue create \
              --title "Métricas reprovadas - ação necessária" \
              --body "$DECISION")

            echo "$ISSUE_URL"

            exit 1

          fi
          
          echo "✅ Métricas aprovadas! Pipeline prosseguindo..."
          exit 0